services:
  comfyui-ltx2:
    build:
      context: .
    image: ${IMAGE_NAME:-ghcr.io/tolgatasci/runpod-ltx2:latest}
    container_name: comfyui-ltx2
    gpus: all
    ports:
      - "8188:8188"
    shm_size: "16gb"
    environment:
      COMFYUI_LISTEN: 0.0.0.0
      COMFYUI_PORT: 8188
      COMFYUI_API_URL: http://127.0.0.1:8188
      RUNPOD_SERVERLESS: ${RUNPOD_SERVERLESS:-false}
      PERSISTENT_ROOT: ${PERSISTENT_ROOT:-/runpod-volume}
      PERSIST_MODELS: ${PERSIST_MODELS:-true}
      PERSIST_INPUT: ${PERSIST_INPUT:-false}
      PERSIST_OUTPUT: ${PERSIST_OUTPUT:-false}
      PERSIST_WORKFLOWS: ${PERSIST_WORKFLOWS:-false}
      PERSIST_HF_CACHE: ${PERSIST_HF_CACHE:-true}
      PERSIST_MODELS_SUBDIR: ${PERSIST_MODELS_SUBDIR:-models}
      PERSIST_INPUT_SUBDIR: ${PERSIST_INPUT_SUBDIR:-input}
      PERSIST_OUTPUT_SUBDIR: ${PERSIST_OUTPUT_SUBDIR:-output}
      PERSIST_WORKFLOWS_SUBDIR: ${PERSIST_WORKFLOWS_SUBDIR:-workflows}
      PERSIST_HF_SUBDIR: ${PERSIST_HF_SUBDIR:-hf-cache}
      RUNTIME_ROOT: ${RUNTIME_ROOT:-/tmp/ltx2-runtime}
      RUNTIME_PRUNE_ENABLED: ${RUNTIME_PRUNE_ENABLED:-true}
      PRUNE_INTERVAL_SECONDS: ${PRUNE_INTERVAL_SECONDS:-300}
      INPUT_RETENTION_SECONDS: ${INPUT_RETENTION_SECONDS:-900}
      OUTPUT_RETENTION_SECONDS: ${OUTPUT_RETENTION_SECONDS:-900}
      TEMP_RETENTION_SECONDS: ${TEMP_RETENTION_SECONDS:-900}
      MODELS_AUTO_DOWNLOAD: "true"
      DOWNLOAD_ONCE: "true"
      REQUIRE_ALL_MODELS: "false"
      CLEANUP_JOB_INPUTS: ${CLEANUP_JOB_INPUTS:-true}
      CLEANUP_JOB_OUTPUTS: ${CLEANUP_JOB_OUTPUTS:-true}
      MAX_INPUT_IMAGE_MB: ${MAX_INPUT_IMAGE_MB:-30}
      MAX_INLINE_OUTPUT_MB: ${MAX_INLINE_OUTPUT_MB:-30}
      HF_HUB_ENABLE_HF_TRANSFER: ${HF_HUB_ENABLE_HF_TRANSFER:-1}
      HF_TOKEN: ${HF_TOKEN:-}
      LTX2_MODEL_SOURCE: ${LTX2_MODEL_SOURCE:-hf://Lightricks/LTX-2/ltx-2-19b-distilled-fp8.safetensors}
      GEMMA_TEXT_ENCODER_SOURCE: ${GEMMA_TEXT_ENCODER_SOURCE:-hf://Comfy-Org/ltx-2/split_files/text_encoders/gemma_3_12B_it.safetensors}
      GEMMA_TOKENIZER_SOURCE: ${GEMMA_TOKENIZER_SOURCE:-hf://Lightricks/LTX-2/tokenizer/tokenizer.model}
      GEMMA_PREPROCESSOR_SOURCE: ${GEMMA_PREPROCESSOR_SOURCE:-hf://Lightricks/LTX-2/tokenizer/preprocessor_config.json}
      SPATIAL_UPSCALER_SOURCE: ${SPATIAL_UPSCALER_SOURCE:-hf://Lightricks/LTX-2/ltx-2-spatial-upscaler-x2-1.0.safetensors}
      TEMPORAL_UPSCALER_SOURCE: ${TEMPORAL_UPSCALER_SOURCE:-hf://Lightricks/LTX-2/ltx-2-temporal-upscaler-x2-1.0.safetensors}
      IC_LORA_UNION_SOURCE: ${IC_LORA_UNION_SOURCE:-hf://Lightricks/LTX-2-19b-IC-LoRA-Union-Control/ltx-2-19b-ic-lora-union-control-ref0.5.safetensors}
      CAMERA_MOTION_LORA_SOURCE: ${CAMERA_MOTION_LORA_SOURCE:-hf://Lightricks/LTX-2-19b-LoRA-Camera-Control-Static/ltx-2-19b-lora-camera-control-static.safetensors}
    volumes:
      - ./data:/runpod-volume
      - ./workflows:/opt/ltx2/workflows
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8188/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped
